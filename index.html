<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unicorn Magic Run</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/game.css">
    <link rel="stylesheet" href="css/ui.css">
</head>

<body>

    <main id="gameContainer" class="game-viewport" data-state="START">
        <div id="scoreBoard" class="score-display">Score: 0</div>

        <canvas id="gameCanvas" class="game-canvas">
            Your browser does not support the HTML5 canvas tag.
        </canvas>

        <!-- Start Screen -->
        <section id="startScreen" class="overlay start-screen">
            <h1 class="ui-text">🦄 Unicorn Magic Run</h1>
            <p class="ui-text">Jump over the dark crystals!</p>
            <button type="button" class="btn js-start-btn">Start Adventure</button>
            <a href="customize.html" class="studio-link">Unicorn Studio &rarr;</a>
            <p class="ui-text ui-subtext">Press Space or Tap to Jump</p>
            <p id="startHighScore" class="ui-text high-score-label">High Score: 0</p>
        </section>

        <!-- Game Over Screen -->
        <section id="gameOverScreen" class="overlay game-over-screen">
            <h1 class="ui-text">Magic Faded!</h1>
            <p id="finalScore" class="ui-text">Score: 0</p>
            <p id="gameOverHighScore" class="ui-text final-high-score">High Score: 0</p>
            <button type="button" class="btn js-start-btn">Try Again</button>
            <a href="customize.html" class="studio-link">Unicorn Studio &rarr;</a>
        </section>
    </main>

    <!-- Bootstrap the Game Engine -->
    <script type="module" src="./js/main.js"></script>
</body>

</html>
