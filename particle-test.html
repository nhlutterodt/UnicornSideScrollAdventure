<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle System Lab</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/lab.css">
</head>
<body class="lab-body">
    <h1 class="lab-title">✨ Particle Engine Laboratory</h1>
    
    <div class="test-container lab-canvas-wrapper">
        <canvas id="testCanvas" class="lab-canvas" width="800" height="500"></canvas>
        <div id="debugInfo" class="lab-debug-panel"></div>
    </div>

    <div class="lab-controls lab-mt-20">
        <div class="lab-spawn-grid">
            <button class="lab-btn" data-effect="TRAIL">Magic Trail</button>
            <button class="lab-btn" data-effect="LAND_DUST">Land Dust</button>
            <button class="lab-btn" data-effect="IMPACT_SPARK">Impact Sparks</button>
            <button class="lab-btn" data-effect="PICKUP_BURST">Pickup Burst</button>
            <button class="lab-btn lab-btn-back lab-btn-full" id="toggleDebug">Toggle Debug</button>
            <button class="lab-btn lab-btn-back lab-btn-full" id="clearParticles">Clear All</button>
        </div>
    </div>

    <p class="lab-text-muted lab-mt-10">Click anywhere on canvas to trigger 'Impact Sparks'</p>

    <script type="module" src="js/particle-test-main.js"></script>
</body>
</html>
