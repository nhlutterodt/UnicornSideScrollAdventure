<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abilities Lab - Unicorn Magic Run</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/ui.css">
    <link rel="stylesheet" href="css/abilities.css">
    <link rel="stylesheet" href="css/lab.css">
</head>
<body class="lab-body">
    <h1 class="lab-title">🦄 Abilities & Powers Lab</h1>
    
    <div class="lab-layout">
        <div class="lab-canvas-wrapper">
            <canvas id="abilityCanvas" class="lab-canvas" width="800" height="500"></canvas>
            <!-- UI replication -->
            <div id="abilityInventory" class="lab-inventory"></div>
        </div>

        <div class="lab-controls">
            <h3 class="lab-heading-small">Grant Abilities</h3>
            <div id="spawnButtons" class="lab-spawn-grid"></div>
            
            <hr class="lab-separator">
            
            <h3 class="lab-heading-small">Execution</h3>
            <button class="lab-btn lab-btn-primary lab-btn-full" id="useCurrent">USE CURRENT (Space)</button>
            <button class="lab-btn lab-btn-back lab-btn-full" id="clearAll">CLEAR ALL</button>

            <div class="lab-hotkeys-list">
                <strong>Hotkeys:</strong><br>
                [Space] Use Ability<br>
                [Q/E] Cycle Abilities<br>
                [W] Jump<br>
                [1-9] Grant specific power
            </div>

            <a href="index.html" class="lab-btn lab-btn-back lab-btn-full">Back to Menu</a>
        </div>
    </div>

    <script type="module" src="js/powers-test-main.js"></script>
</body>
</html>
